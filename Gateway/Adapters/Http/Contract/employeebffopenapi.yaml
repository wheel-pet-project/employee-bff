openapi: 3.0.0
info:
  title: Employee BFF
  version: 1.0.0
  description: BFF для работы с приложениями сотрудников
tags:
  - name: identity
    description: аутентификация, авторизация, создание и восстановление аккаунта клиента
  - name: model
    description: модели автомобилей доступные для аренды
  - name: driving-license
    description: управление водительским удостоверением
  - name: vehicle
    description: автомобили доступные для аренды
  - name: booking
    description: бронирование автомобилей
  - name: vehicle-check
    description: проверка автомобиля клиентом перед арендой
  - name: rent
    description: аренда автомобилей
  - name: vehicle-documents
    description: управление документами на автомобиль (ОСАГО, ПТС, СТС)
paths:
  /v1.0/identity/authenticate:
    post:
      operationId: authenticate
      tags:
        - identity
      summary: Аутентификация аккаунта
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthenticateRequest'
      responses:
        '200':
          description: Успешная операция
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticateResponse'
        '500':
          description: Внутренняя ошибка сервера
        '404':
          description: Аккаунт с таким идентификатором не найден
  /v1.0/identity/account/create:
    post:
      operationId: createAccount
      tags:
        - identity
      summary: Создание аккаунта
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
      responses:
        '201':
          description: Аккаунт успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '500':
          description: Внутренняя ошибка сервера
  /v1.0/identity/{accountId}/confirmation-token/{confirmationToken}/confirm:
    post:
      operationId: confirmAccountEmail
      tags:
        - identity
      summary: Подтверждение email аккаунта
      parameters:
        - name: accountId
          in: path
          description: Идентификатор аккаунта
          required: true
          schema:
            type: string
            format: uuid
        - name: confirmationToken
          in: path
          description: Токен подтверждения
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Успешная операция
        '500':
          description: Внутренняя ошибка сервера
        '404':
          description: Токен подтверждения не найден
  /v1.0/identity/refresh-access-token:
    post:
      operationId: refreshAccessToken
      tags:
        - identity
      summary: Обновление токена доступа
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshAccessTokenRequest'
      responses:
        '200':
          description: Успешная операция
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshAccessTokenResponse'
        '500':
          description: Внутренняя ошибка сервера
        '404':
          description: Refresh token с таким идентификатором не найден
  /v1.0/identity/account/recover-password:
    post:
      operationId: recoverPassword
      tags:
        - identity
      summary: Восстановление пароля
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoverPasswordRequest'
      responses:
        '200':
          description: Успешная операция
        '500':
          description: Внутренняя ошибка сервера
        '404':
          description: Аккаунт с таким идентификатором не найден
  /v1.0/identity/account/update-password:
    post:
      operationId: updatePassword
      tags:
        - identity
      summary: Обновление пароля
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
      responses:
        '200':
          description: Успешная операция
        '500':
          description: Внутренняя ошибка сервера
        '404':
          description: Аккаунт с таким идентификатором не найден
  /v1.0/checks/{checkId}:
    get:
      tags:
        - vehicle-check
      summary: Get Check by ID
      operationId: getCheckById
      description: Получает информацию о проверке по её уникальному идентификатору.
      parameters:
        - in: path
          name: checkId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор проверки.
      responses:
        '200':
          description: Успешный ответ с информацией о проверке.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCheckByIdResponse'
        '404':
          description: Проверка с указанным ID не найдена.
  /v1.0/checks/for-review:
    get:
      tags:
        - vehicle-check
      summary: Get All Checks for Considerate Review
      operationId: getAllChecksForConsiderateReview
      description: Получает список всех проверок, требующих внимательного рассмотрения.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            format: int32
          required: false
          description: Номер страницы для пагинации.
        - in: query
          name: pageSize
          schema:
            type: integer
            format: int32
          required: false
          description: Количество элементов на странице для пагинации.
      responses:
        '200':
          description: Успешный ответ со списком проверок.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllChecksForConsiderateReviewResponse'
  /v1.0/models:
    post:
      tags:
        - model
      summary: Add New Model
      operationId: addModel
      description: Добавляет новую модель автомобиля.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddModelReq'
      responses:
        '200':
          description: Модель успешно добавлена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddModelRes'
        '400':
          description: Некорректный запрос.
    get:
      tags:
        - model
      summary: Get All Models
      operationId: getAllModels
      description: Получает список всех доступных моделей автомобилей.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            format: int32
          required: false
          description: Номер страницы для пагинации.
        - in: query
          name: pageSize
          schema:
            type: integer
            format: int32
          required: false
          description: Количество элементов на странице для пагинации.
      responses:
        '200':
          description: Успешный ответ со списком моделей.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllModelsRes'
  /v1.0/models/{modelId}:
    get:
      tags:
        - model
      summary: Get Model by ID
      operationId: getModelById
      description: Получает информацию о модели автомобиля по её уникальному идентификатору.
      parameters:
        - in: path
          name: modelId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор модели.
      responses:
        '200':
          description: Успешный ответ с информацией о модели.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetModelByIdRes'
        '404':
          description: Модель с указанным ID не найдена.
  /v1.0/models/{modelId}/category:
    patch:
      tags:
        - model
      summary: Update Model Category
      operationId: updateModelCategory
      description: Обновляет категорию модели автомобиля.
      parameters:
        - in: path
          name: modelId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор модели.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModelCategoryReq'
      responses:
        '200':
          description: Категория модели успешно обновлена.
        '400':
          description: Некорректный запрос.
        '404':
          description: Модель с указанным ID не найдена.
  /v1.0/models/{modelId}/tariff:
    patch:
      tags:
        - model
      summary: Update Model Tariff
      operationId: updateModelTariff
      description: Обновляет тарифы модели автомобиля.
      parameters:
        - in: path
          name: modelId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор модели.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModelTariffReq'
      responses:
        '200':
          description: Тарифы модели успешно обновлены.
        '400':
          description: Некорректный запрос.
        '404':
          description: Модель с указанным ID не найдена.
  /v1.0/vehicles:
    post:
      tags:
        - vehicle
      summary: Add New Vehicle
      operationId: addVehicle
      description: Добавляет новый автомобиль в автопарк.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddVehicleReq'
      responses:
        '200':
          description: Автомобиль успешно добавлен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddVehicleRes'
        '400':
          description: Некорректный запрос.
    get:
      tags:
        - vehicle
      summary: Get All Vehicles
      operationId: getAllVehicles
      description: Получает список всех автомобилей с возможностью фильтрации по статусу.
      parameters:
        - in: query
          name: filteringStatus
          schema:
            $ref: '#/components/schemas/Status'
          required: true
          description: Статус для фильтрации автомобилей.
        - in: query
          name: page
          schema:
            type: integer
            format: int32
          required: false
          description: Номер страницы для пагинации.
        - in: query
          name: pageSize
          schema:
            type: integer
            format: int32
          required: false
          description: Количество элементов на странице для пагинации.
      responses:
        '200':
          description: Успешный ответ со списком автомобилей.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllVehiclesRes'
  /v1.0/vehicles/{vehicleId}:
    get:
      tags:
        - vehicle
      summary: Get Vehicle by ID
      operationId: getVehicleById
      description: Получает краткую информацию об автомобиле по его уникальному идентификатору.
      parameters:
        - in: path
          name: vehicleId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор автомобиля.
      responses:
        '200':
          description: Успешный ответ с краткой информацией об автомобиле.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetVehicleByIdRes'
        '404':
          description: Автомобиль с указанным ID не найден.
    delete:
      tags:
        - vehicle
      summary: Delete Vehicle
      operationId: deleteVehicle
      description: Удаляет автомобиль из автопарка.
      parameters:
        - in: path
          name: vehicleId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор автомобиля.
      responses:
        '200':
          description: Автомобиль успешно удален.
        '404':
          description: Автомобиль с указанным ID не найден.
  /v1.0/vehicles/{vehicleId}/details:
    get:
      tags:
        - vehicle
      summary: Get Vehicle Details by ID
      operationId: getVehicleDetailsById
      description: Получает подробную информацию об автомобиле по его уникальному идентификатору.
      parameters:
        - in: path
          name: vehicleId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор автомобиля.
      responses:
        '200':
          description: Успешный ответ с подробной информацией об автомобиле.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetVehicleDetailsByIdRes'
        '404':
          description: Автомобиль с указанным ID не найден.
  /v1.0/vehicles/{vehicleId}/mark-as-readied-for-release:
    post:
      tags:
        - vehicle
      summary: Mark Vehicle as Readied for Release
      operationId: markAsReadiedForReleaseVehicle
      description: Отмечает автомобиль как подготовленный к выпуску.
      parameters:
        - in: path
          name: vehicleId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор автомобиля.
      responses:
        '200':
          description: Автомобиль успешно отмечен как подготовленный к выпуску.
        '404':
          description: Автомобиль с указанным ID не найден.
  /v1.0/vehicles/{vehicleId}/release:
    post:
      tags:
        - vehicle
      summary: Release Vehicle
      operationId: releaseVehicle
      description: Выпускает автомобиль в аренду.
      parameters:
        - in: path
          name: vehicleId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор автомобиля.
      responses:
        '200':
          description: Автомобиль успешно выпущен.
        '404':
          description: Автомобиль с указанным ID не найден.
  /v1.0/vehicles/{vehicleId}/send-to-service:
    post:
      tags:
        - vehicle
      summary: Send Vehicle to Service
      operationId: sendToServiceVehicle
      description: Отправляет автомобиль на обслуживание.
      parameters:
        - in: path
          name: vehicleId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор автомобиля.
      responses:
        '200':
          description: Автомобиль успешно отправлен на обслуживание.
        '404':
          description: Автомобиль с указанным ID не найден.
  /v1.0/vehicles/in-square:
    post:
      tags:
        - vehicle
      summary: Get Vehicles in Square
      operationId: getVehiclesInSquare
      description: Получает список автомобилей, находящихся в заданном квадратном регионе.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetVehiclesInSquareReq'
      responses:
        '200':
          description: Успешный ответ со списком автомобилей в указанном регионе.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetVehiclesInSquareRes'
        '400':
          description: Некорректные координаты или статус.
  /v1.0/vehicle-documents/{vehicleDocumentsId}/osago:
    post:
      tags:
        - vehicle-documents
      summary: Add OSAGO
      operationId: addOsago
      description: Добавляет информацию об ОСАГО для документов на автомобиль.
      parameters:
        - in: path
          name: vehicleDocumentsId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор комплекта документов на автомобиль.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddOsagoRequest'
      responses:
        '200':
          description: Информация об ОСАГО успешно добавлена.
        '400':
          description: Некорректный запрос.
        '404':
          description: Документы на автомобиль с указанным ID не найдены.
    get:
      tags:
        - vehicle-documents
      summary: Get OSAGO by Vehicle Documents ID
      operationId: getOsagoByVehicleDocumentsId
      description: Получает информацию об ОСАГО по идентификатору комплекта документов на автомобиль.
      parameters:
        - in: path
          name: vehicleDocumentsId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор комплекта документов на автомобиль.
      responses:
        '200':
          description: Успешный ответ с информацией об ОСАГО.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOsagoByVehicleDocumentsIdResponse'
        '404':
          description: Информация об ОСАГО или документы на автомобиль не найдены.
  /v1.0/vehicle-documents/{vehicleDocumentsId}/pts:
    post:
      tags:
        - vehicle-documents
      summary: Add PTS
      operationId: addPts
      description: Добавляет информацию о ПТС для документов на автомобиль.
      parameters:
        - in: path
          name: vehicleDocumentsId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор комплекта документов на автомобиль.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPtsRequest'
      responses:
        '200':
          description: Информация о ПТС успешно добавлена.
        '400':
          description: Некорректный запрос.
        '404':
          description: Документы на автомобиль с указанным ID не найдены.
    get:
      tags:
        - vehicle-documents
      summary: Get PTS by Vehicle Documents ID
      operationId: getPtsByVehicleDocumentsId
      description: Получает информацию о ПТС по идентификатору комплекта документов на автомобиль.
      parameters:
        - in: path
          name: vehicleDocumentsId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор комплекта документов на автомобиль.
      responses:
        '200':
          description: Успешный ответ с информацией о ПТС.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPtsByVehicleDocumentsIdResponse'
        '404':
          description: Информация о ПТС или документы на автомобиль не найдены.
  /v1.0/vehicle-documents/{vehicleDocumentsId}/sts:
    post:
      tags:
        - vehicle-documents
      summary: Add STS
      operationId: addSts
      description: Добавляет информацию о СТС для документов на автомобиль.
      parameters:
        - in: path
          name: vehicleDocumentsId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор комплекта документов на автомобиль.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddStsRequest'
      responses:
        '200':
          description: Информация о СТС успешно добавлена.
        '400':
          description: Некорректный запрос.
        '404':
          description: Документы на автомобиль с указанным ID не найдены.
    get:
      tags:
        - vehicle-documents
      summary: Get STS by Vehicle Documents ID
      operationId: getStsByVehicleDocumentsId
      description: Получает информацию о СТС по идентификатору комплекта документов на автомобиль.
      parameters:
        - in: path
          name: vehicleDocumentsId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор комплекта документов на автомобиль.
      responses:
        '200':
          description: Успешный ответ с информацией о СТС.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetStsByVehicleDocumentsIdResponse'
        '404':
          description: Информация о СТС или документы на автомобиль не найдены.
  /v1.0/vehicle-documents:
    get:
      tags:
        - vehicle-documents
      summary: Get Vehicle Documents by Vehicle ID
      operationId: getVehicleDocumentsByVehicleId
      description: Получает статус наличия документов (ПТС, СТС, ОСАГО) для указанного автомобиля.
      parameters:
        - in: query
          name: vehicleId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор автомобиля.
      responses:
        '200':
          description: Успешный ответ со статусом документов автомобиля.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetVehicleDocumentsByVehicleIdResponse'
        '404':
          description: Документы для указанного автомобиля не найдены.
  /v1.0/rents:
    get:
      tags:
        - rent
      summary: Get All Current Rents
      operationId: getAllCurrentRents
      description: Получает список всех текущих аренд.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            format: int32
          required: true
          description: Номер страницы для пагинации.
        - in: query
          name: pageSize
          schema:
            type: integer
            format: int32
          required: true
          description: Количество элементов на странице для пагинации.
      responses:
        '200':
          description: Успешный ответ со списком текущих аренд.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllCurrentRentsResponse'
        '400':
          description: Некорректные параметры пагинации.
  /v1.0/rents/{rentId}:
    get:
      tags:
        - rent
      summary: Get Rent by ID
      operationId: getRentById
      description: Получает полную информацию об аренде по её уникальному идентификатору.
      parameters:
        - in: path
          name: rentId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор аренды.
      responses:
        '200':
          description: Успешный ответ с информацией об аренде.
          content:
