  /v1.0/rents/{rentId}/current-amount:
    get:
      tags:
        - rent
      summary: Get Current Amount Rent
      operationId: getCurrentAmountRent
      description: Получает текущую стоимость аренды по её уникальному идентификатору.
      parameters:
        - in: path
          name: rentId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор аренды.
      responses:
        '200':
          description: Успешный ответ с текущей стоимостью аренды.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCurrentAmountRentResponse'
        '404':
          description: Аренда с указанным ID не найдена.
  /v1.0/driving-licenses/{licenseId}:
    get:
      tags:
        - driving-license
      summary: Get Driving License by ID
      operationId: getLicenseById
      description: Получает информацию о водительском удостоверении по его уникальному идентификатору.
      parameters:
        - in: path
          name: licenseId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор водительского удостоверения.
      responses:
        '200':
          description: Успешный ответ с информацией о водительском удостоверении.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLicenseByIdResponse'
        '404':
          description: Водительское удостоверение с указанным ID не найдено.
  /v1.0/driving-licenses:
    get:
      tags:
        - driving-license
      summary: Get All Driving Licenses
      operationId: getAllLicenses
      description: Получает список всех водительских удостоверений с возможностью фильтрации по статусу.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            format: int32
          required: false
          description: Номер страницы для пагинации.
        - in: query
          name: pageSize
          schema:
            type: integer
            format: int32
          required: false
          description: Количество элементов на странице для пагинации.
        - in: query
          name: filteringStatus
          schema:
            $ref: '#/components/schemas/DrivingLicenseStatus'
          required: true
          description: Статус для фильтрации водительских удостоверений.
      responses:
        '200':
          description: Успешный ответ со списком водительских удостоверений.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllLicensesResponse'
        '400':
          description: Некорректные параметры запроса.
  /v1.0/driving-licenses/{licenseId}/approve:
    post:
      tags:
        - driving-license
      summary: Approve Driving License
      operationId: approveLicense
      description: Одобряет водительское удостоверение.
      parameters:
        - in: path
          name: licenseId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор водительского удостоверения.
      responses:
        '200':
          description: Водительское удостоверение успешно одобрено.
        '404':
          description: Водительское удостоверение с указанным ID не найдено.
        '400':
          description: Невозможно одобрить водительское удостоверение в текущем статусе.
  /v1.0/driving-licenses/{licenseId}/reject:
    post:
      tags:
        - driving-license
      summary: Reject Driving License
      operationId: rejectLicense
      description: Отклоняет водительское удостоверение.
      parameters:
        - in: path
          name: licenseId
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор водительского удостоверения.
      responses:
        '200':
          description: Водительское удостоверение успешно отклонено.
        '404':
          description: Водительское удостоверение с указанным ID не найдено.
        '400':
          description: Невозможно отклонить водительское удостоверение в текущем статусе.
